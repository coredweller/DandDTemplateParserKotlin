ktor {
  deployment {
    port = 8080
    port = ${?PORT}
  }
  application {
    modules = [ com.dandd.templateparser.ApplicationKt.module ]
  }
}

database {
  url = ${?DATABASE_URL}
  user = ${?DATABASE_USER}
  password = ${?DATABASE_PASSWORD}
  pool {
    maximum-pool-size = 10
    minimum-idle = 2
    connection-timeout-ms = 30000
  }
}

jwt {
  secret = "change-me-in-production"
  secret = ${?JWT_SECRET}
  issuer = "com.dandd.templateparser"
  audience = "templateparser-users"
  expiry-seconds = 3600
}
